<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Properties714 Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter, sans-serif;
background:#0f1116;
color:#e8e6e0;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

h1{
margin-bottom:25px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1a1d25;
padding:20px;
border-radius:10px;
border:1px solid #2a2f3a;
}

.stat-number{
font-size:28px;
font-weight:700;
margin-top:6px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th,
.table td{
padding:10px;
border-bottom:1px solid #2a2f3a;
text-align:left;
font-size:13px;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:11px;
}

.badge-green{background:#173b2c;color:#3cff9a}
.badge-red{background:#3b1b1b;color:#ff6b6b}
.badge-blue{background:#13243a;color:#5aa9ff}

button{
background:#2a2f3a;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

button:hover{
background:#3a4050;
}

</style>

</head>

<body>

<div class="container">

<h1>Properties714 — Admin Panel</h1>


<!-- PLATFORM STATS -->

<div class="stats-grid">

<div class="card">
<div>Total Users</div>
<div id="stat-users" class="stat-number">0</div>
</div>

<div class="card">
<div>Deals Analyzed</div>
<div id="stat-deals" class="stat-number">0</div>
</div>

<div class="card">
<div>Active Subscribers</div>
<div id="stat-subs" class="stat-number">0</div>
</div>

<div class="card">
<div>Monthly Revenue</div>
<div id="stat-revenue" class="stat-number">$0</div>
</div>

</div>


<!-- USERS TABLE -->

<div class="card">

<h3 style="margin-top:0">Users</h3>

<table class="table">

<thead>

<tr>
<th>Email</th>
<th>Joined</th>
<th>Deals</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="users-table">

<tr>
<td colspan="5">Loading users...</td>
</tr>

</tbody>

</table>

</div>


<!-- DEAL ACTIVITY -->

<div class="card" style="margin-top:30px">

<h3 style="margin-top:0">Recent Deals</h3>

<table class="table">

<thead>

<tr>
<th>Property</th>
<th>User</th>
<th>Score</th>
<th>Recommendation</th>
<th>Date</th>
</tr>

</thead>

<tbody id="deals-table">

<tr>
<td colspan="5">Loading deals...</td>
</tr>

</tbody>

</table>

</div>


</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="config.js"></script>

<script src="admin.js"></script>

</body>

</html>
